name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # Full-repo checkout is a correctness requirement. The reviewer needs
      # to read files referenced by the diff (imports, callers, tests,
      # config) to verify evidence. Shallow clones break evidence gates.
      - name: Checkout full repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: Run review skills
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node samples/pr-review/scripts/run-reviews.mjs \
            --skills samples/pr-review/.claude/skills \
            --diff /tmp/pr.diff \
            --repo . \
            --out /tmp/findings.json

      - name: Post findings as PR review comments
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('/tmp/findings.json')) {
              console.log('No findings file produced; skipping comments.');
              return;
            }
            const findings = JSON.parse(fs.readFileSync('/tmp/findings.json', 'utf-8'));
            if (findings.length === 0) {
              console.log('No findings to post.');
              return;
            }
            for (const f of findings) {
              try {
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  body: `**${f.skill}** (${f.severity}): ${f.rationale}\n\n_Evidence:_ ${f.evidence}`,
                  path: f.file,
                  line: f.line,
                  commit_id: context.payload.pull_request.head.sha,
                });
              } catch (e) {
                console.log(`Skipping ${f.file}:${f.line} (${e.message})`);
              }
            }
