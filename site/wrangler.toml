name = "bdigital-public"
main = "dist/_worker.js/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Astro static build output is served as assets.
# Replace the `main` above with a static-only config if not using SSR.
[assets]
directory = "./dist"
binding = "ASSETS"

# Uncomment and set a custom domain when deploying.
# routes = [
#   { pattern = "public.bdigitalmedia.io/*", custom_domain = true }
# ]

# Cloudflare account and zone are configured via CLOUDFLARE_API_TOKEN and
# CF_ACCOUNT_ID environment variables, not hardcoded here.
